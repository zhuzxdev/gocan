run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - revive
    - errcheck
    - ineffassign
    - misspell
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
      - name: var-naming

issues:
  exclude-rules:
    # raw 子包是底层绑定，类型名沿用 C 风格 (TPCANMsg, TPCANStatus 等)
    - path: raw/
      linters:
        - revive
