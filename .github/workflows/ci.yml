name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: tests (race)
        run: go test -race ./...
      - name: build examples
        run: go build ./examples/...
      - name: cross-compile windows/amd64
        run: GOOS=windows GOARCH=amd64 go build ./...
      - name: cross-compile windows/386
        run: GOOS=windows GOARCH=386 go build ./...

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go vet
        run: go vet ./...
      - name: tests
        run: go test ./...
      - name: build examples
        run: go build ./examples/...
